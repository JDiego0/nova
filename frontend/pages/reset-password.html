<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña — NOVA</title>
  <link rel="icon" href="../assets/img/logo_oscuro_SF.png" type="image/png">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { display:flex;align-items:center;justify-content:center;min-height:100vh; }
    .box { width:100%;max-width:400px;padding:40px 32px;background:var(--surface);border-radius:20px;border:1px solid var(--border);box-shadow:0 8px 40px rgba(0,0,0,.1); }
    .logo-wrap { text-align:center;margin-bottom:28px; }
    .logo-wrap img { height:48px; }
    h2 { font-size:1.4rem;margin-bottom:6px; }
    .sub { color:var(--text3);font-size:.9rem;margin-bottom:24px; }
    .pw-wrap { position:relative; }
    /* Ocultar el ojo nativo del browser (Chrome/Edge/Safari) */
    .pw-wrap input[type="password"]::-ms-reveal,
    .pw-wrap input[type="password"]::-ms-clear,
    .pw-wrap input::-webkit-credentials-auto-fill-button,
    .pw-wrap input::-webkit-textfield-decoration-container { display:none !important; }
    /* Un único ojo — siempre visible, color neutro */
    .pw-wrap .toggle-pw {
      position:absolute;right:10px;top:50%;transform:translateY(-50%);
      cursor:pointer;color:var(--text3);background:none;border:none;
      font-size:1rem;padding:4px;line-height:1;
      transition:color .15s;
    }
    .pw-wrap .toggle-pw:hover { color:var(--primary); }
    .success-box { display:none;text-align:center;padding:24px 0; }
    .success-icon { font-size:3rem;margin-bottom:12px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo-wrap">
      <img src="../assets/img/logo_oscuro_SF.png" alt="NOVA" id="logo-img">
    </div>

    <div id="form-section">
      <h2>Nueva contraseña</h2>
      <p class="sub">Ingresa y confirma tu nueva contraseña.</p>
      <div class="form-group">
        <label class="form-label">Nueva contraseña</label>
        <div class="pw-wrap">
          <input type="password" class="form-control" id="pw1" placeholder="Mínimo 6 caracteres" style="padding-right:42px">
          <button class="toggle-pw" onclick="togglePw('pw1',this)"><i class="bi bi-eye"></i></button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmar contraseña</label>
        <div class="pw-wrap">
          <input type="password" class="form-control" id="pw2" placeholder="Repite la contraseña" style="padding-right:42px">
          <button class="toggle-pw" onclick="togglePw('pw2',this)"><i class="bi bi-eye"></i></button>
        </div>
      </div>
      <div id="err" style="color:var(--danger);font-size:.85rem;margin-bottom:12px;display:none"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doReset()">
        <span id="btn-text">Guardar contraseña</span>
        <span id="btn-spin" class="spinner" style="display:none;width:16px;height:16px;border-width:2px;border-color:rgba(255,255,255,.4);border-top-color:#fff"></span>
      </button>
    </div>

    <div class="success-box" id="success-section">
      <div class="success-icon"><i class="bi bi-check-circle" style="color:var(--success,#10b981)"></i></div>
      <h3>¡Contraseña actualizada!</h3>
      <p style="color:var(--text3);margin-bottom:20px">Ya puedes iniciar sesión con tu nueva contraseña.</p>
      <a href="/pages/login.html" class="btn btn-primary" style="justify-content:center">Ir al login</a>
    </div>

    <div id="invalid-section" style="display:none;text-align:center;padding:24px 0">
      <div style="font-size:3rem;margin-bottom:12px"><i class="bi bi-exclamation-triangle" style="color:var(--warning)"></i></div>
      <h3>Enlace inválido o expirado</h3>
      <p style="color:var(--text3);margin-bottom:20px">Solicita un nuevo enlace de recuperación.</p>
      <a href="/pages/login.html" class="btn btn-ghost" style="justify-content:center">Volver al login</a>
    </div>
  </div>

  <div id="toast-container"></div>
  <script>
    const API = (window.NOVA_API_URL || '') + '/api';
    ;(function(){
      const t = localStorage.getItem('nova_theme') || 'light';
      document.body.classList.add(t, 'ready');
    })();

    // Obtener token de la URL
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('form-section').style.display    = 'none';
      document.getElementById('invalid-section').style.display = 'block';
    }

    function togglePw(id, btn) {
      const inp  = document.getElementById(id);
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      btn.querySelector('i').className = `bi bi-eye${show ? '-slash' : ''}`;
    }

    async function doReset() {
      const pw1  = document.getElementById('pw1').value;
      const pw2  = document.getElementById('pw2').value;
      const errEl = document.getElementById('err');
      errEl.style.display = 'none';

      if (!pw1 || !pw2) { errEl.textContent = 'Completa ambos campos'; errEl.style.display=''; return; }
      if (pw1.length < 6) { errEl.textContent = 'Mínimo 6 caracteres'; errEl.style.display=''; return; }
      if (pw1 !== pw2) { errEl.textContent = 'Las contraseñas no coinciden'; errEl.style.display=''; return; }

      document.getElementById('btn-text').style.display = 'none';
      document.getElementById('btn-spin').style.display = 'inline-block';

      try {
        const r = await fetch(`${API}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pw1 })
        });
        const data = await r.json();
        if (!r.ok) {
          errEl.textContent = data.error || 'Error al actualizar';
          errEl.style.display = '';
          document.getElementById('btn-text').style.display    = 'inline';
          document.getElementById('btn-spin').style.display    = 'none';
          if (r.status === 400 && data.error?.includes('xpir')) {
            document.getElementById('form-section').style.display    = 'none';
            document.getElementById('invalid-section').style.display = 'block';
          }
          return;
        }
        document.getElementById('form-section').style.display    = 'none';
        document.getElementById('success-section').style.display = 'block';
      } catch {
        errEl.textContent = 'Error de conexión';
        errEl.style.display = '';
        document.getElementById('btn-text').style.display = 'inline';
        document.getElementById('btn-spin').style.display = 'none';
      }
    }
  </script>
</body>
</html>
